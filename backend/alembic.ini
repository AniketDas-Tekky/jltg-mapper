# Alembic configuration. The database URL is supplied programmatically in
# alembic/env.py from app.config.settings (so it honors JLTG_DATABASE_URL / .env).

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# version_locations defaults to <script_location>/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
